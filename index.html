<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ci vediamo domani? 💛</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-wrap">
  <div class="card">
    <p class="eyebrow">un piccolo pensiero per te</p>

    <div class="illustration-wrap">
      <svg class="branch" viewBox="0 0 340 190" xmlns="http://www.w3.org/2000/svg">
        <!-- ramo -->
        <path d="M10 40 Q170 10 330 45" stroke="#8B6146" stroke-width="10" fill="none" stroke-linecap="round"/>
        <path d="M60 40 Q65 20 80 8" stroke="#8B6146" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M250 42 Q255 20 275 10" stroke="#8B6146" stroke-width="6" fill="none" stroke-linecap="round"/>
        <!-- foglie sul ramo -->
        <ellipse cx="82" cy="6" rx="10" ry="6" fill="#4A5D45" transform="rotate(-20 82 6)"/>
        <ellipse cx="277" cy="8" rx="10" ry="6" fill="#4A5D45" transform="rotate(15 277 8)"/>
        <ellipse cx="30" cy="35" rx="9" ry="5" fill="#4A5D45" transform="rotate(-30 30 35)"/>

        <!-- fiori appesi al ramo -->
        <g>
          <circle cx="110" cy="46" r="5" fill="#FAF3E7"/>
          <circle cx="100" cy="40" r="4.5" fill="#C97D8B"/>
          <circle cx="120" cy="40" r="4.5" fill="#C97D8B"/>
          <circle cx="110" cy="34" r="4.5" fill="#C97D8B"/>
          <circle cx="110" cy="46" r="2.5" fill="#8B6146"/>
        </g>
        <g>
          <circle cx="245" cy="48" r="4" fill="#FAF3E7"/>
          <circle cx="238" cy="43" r="3.5" fill="#C97D8B"/>
          <circle cx="252" cy="43" r="3.5" fill="#C97D8B"/>
          <circle cx="245" cy="38" r="3.5" fill="#C97D8B"/>
        </g>

        <!-- cuore pendente al centro -->
        <g id="heartHang">
          <path d="M175 50 Q177 65 179 78" stroke="#A87F5F" stroke-width="2" fill="none" stroke-linecap="round"/>
          <g id="heart" transform="translate(177,116)">
            <path d="M0 -8 C-16 -22 -34 -6 0 20 C34 -6 16 -22 0 -8 Z" fill="var(--rose)"/>
            <ellipse cx="-9" cy="-8" rx="4" ry="2.5" fill="#FFFDF8" opacity="0.55" transform="rotate(-25 -9 -8)"/>
          </g>
        </g>
      </svg>
    </div>

    <h1 class="title">Ci vediamo domani?</h1>
    <p class="subtitle">Aspetto la tua risposta&hellip; con il cuore in gola.</p>

    <div class="choice-row">
      <button class="btn btn-yes" id="btnYes">Sì</button>
      <button class="btn btn-no" id="btnNo">No</button>
    </div>

    <p class="hint" id="hint">&nbsp;</p>
  </div>
</div>

<script>
  const btnNo = document.getElementById('btnNo');
  const btnYes = document.getElementById('btnYes');
  const hint = document.getElementById('hint');
  const heart = document.getElementById('heart');

  const hints = [
    "il cuore lo sposta anche per te",
    "coraggio, riprova... o forse no 💛",
    "quel No non si prende facilmente",
    "il Sì è la scelta più comoda",
    "forse è meglio arrendersi al Sì"
  ];
  let hintIndex = 0;
  let dodgeCount = 0;

  function placeButtonInitial() {
    const rect = btnYes.getBoundingClientRect();
    btnNo.style.left = (rect.right + 18) + 'px';
    btnNo.style.top = rect.top + 'px';
  }

  function randomSafePosition() {
    const margin = 24;
    const bw = btnNo.offsetWidth || 90;
    const bh = btnNo.offsetHeight || 50;
    const maxX = window.innerWidth - bw - margin;
    const maxY = window.innerHeight - bh - margin;
    const x = margin + Math.random() * Math.max(1, (maxX - margin));
    const y = margin + Math.random() * Math.max(1, (maxY - margin));
    return { x, y };
  }

  function dodge() {
    const { x, y } = randomSafePosition();
    btnNo.style.left = x + 'px';
    btnNo.style.top = y + 'px';
    dodgeCount++;
    hint.textContent = hints[hintIndex % hints.length];
    hintIndex++;
  }

  function distanceToButton(clientX, clientY) {
    const rect = btnNo.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    return Math.hypot(clientX - cx, clientY - cy);
  }

  const THRESHOLD = 110;

  window.addEventListener('mousemove', (e) => {
    if (distanceToButton(e.clientX, e.clientY) < THRESHOLD) {
      dodge();
    }
  });

  // Touch: se il dito si avvicina o tocca il bottone, scappa e blocca il click
  window.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    if (t && distanceToButton(t.clientX, t.clientY) < THRESHOLD) {
      dodge();
    }
  }, { passive: true });

  btnNo.addEventListener('touchstart', (e) => {
    e.preventDefault();
    e.stopPropagation();
    dodge();
  }, { passive: false });

  btnNo.addEventListener('click', (e) => {
    // fallback: non dovrebbe mai attivarsi, ma nel dubbio scappa comunque
    e.preventDefault();
    dodge();
  });

  btnYes.addEventListener('mouseenter', () => {
    heart.style.transform = 'scale(1.15)';
  });
  btnYes.addEventListener('mouseleave', () => {
    heart.style.transform = 'scale(1)';
  });

  btnYes.addEventListener('click', () => {
    window.location.href = 'appuntamento.html';
  });

  window.addEventListener('resize', () => {
    // riposiziona dentro i confini se la finestra cambia
    const rect = btnNo.getBoundingClientRect();
    const maxX = window.innerWidth - rect.width - 24;
    const maxY = window.innerHeight - rect.height - 24;
    if (rect.left > maxX || rect.top > maxY) dodge();
  });

  placeButtonInitial();
</script>

</body>
</html>
