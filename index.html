<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ci vediamo? ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-wrap">
  <div class="card">
    <div class="illustration-wrap">

        <!-- ramo -->

        <ellipse cx="277" cy="8" rx="10" ry="6" fill="#4A5D45" transform="rotate(15 277 8)"/>
        <ellipse cx="30" cy="35" rx="9" ry="5" fill="#4A5D45" transform="rotate(-30 30 35)"/>

        <!-- fiori lungo tutto il ramo -->

          <circle cx="42" cy="27" r="5" fill="#FAF3E7"/>

          <circle cx="50" cy="22" r="4.3" fill="#C97D8B"/>
          <circle cx="42" cy="17" r="4.3" fill="#C97D8B"/>
          <circle cx="42" cy="27" r="2.3" fill="#8B6146"/>
        </g>
        <g>
          <circle cx="74" cy="22" r="4.5" fill="#FAF3E7"/>
          <circle cx="67" cy="18" r="3.8" fill="#B0596B"/>
          <circle cx="81" cy="18" r="3.8" fill="#B0596B"/>
          <circle cx="74" cy="14" r="3.8" fill="#B0596B"/>
          <circle cx="74" cy="22" r="2" fill="#8B6146"/>
        </g>
        <g>
          <circle cx="106" cy="19" r="5" fill="#FAF3E7"/>
          <circle cx="98" cy="15" r="4.3" fill="#C97D8B"/>
          <circle cx="114" cy="15" r="4.3" fill="#C97D8B"/>
          <circle cx="106" cy="10" r="4.3" fill="#C97D8B"/>
          <circle cx="106" cy="19" r="2.3" fill="#8B6146"/>
        </g>
        <g>
          <circle cx="138" cy="17" r="4" fill="#FAF3E7"/>
          <circle cx="132" cy="13" r="3.4" fill="#B0596B"/>
          <circle cx="144" cy="13" r="3.4" fill="#B0596B"/>
          <circle cx="138" cy="9" r="3.4" fill="#B0596B"/>
          <circle cx="138" cy="17" r="1.8" fill="#8B6146"/>
        </g>
        <g>
          <circle cx="202" cy="18" r="4" fill="#FAF3E7"/>
          <circle cx="196" cy="14" r="3.4" fill="#B0596B"/>
          <circle cx="208" cy="14" r="3.4" fill="#B0596B"/>
          <circle cx="202" cy="10" r="3.4" fill="#B0596B"/>
          <circle cx="202" cy="18" r="1.8" fill="#8B6146"/>
        </g>
        <g>
          <circle cx="234" cy="21" r="5" fill="#FAF3E7"/>
          <circle cx="226" cy="17" r="4.3" fill="#C97D8B"/>
          <circle cx="242" cy="17" r="4.3" fill="#C97D8B"/>
          <circle cx="234" cy="12" r="4.3" fill="#C97D8B"/>
          <circle cx="234" cy="21" r="2.3" fill="#8B6146"/>
        </g>
        <g>
          <circle cx="266" cy="25" r="4.5" fill="#FAF3E7"/>
          <circle cx="259" cy="21" r="3.8" fill="#B0596B"/>
          <circle cx="273" cy="21" r="3.8" fill="#B0596B"/>
          <circle cx="266" cy="17" r="3.8" fill="#B0596B"/>
          <circle cx="266" cy="25" r="2" fill="#8B6146"/>
        </g>
        <g>
          <circle cx="298" cy="30" r="5" fill="#FAF3E7"/>
          <circle cx="290" cy="26" r="4.3" fill="#C97D8B"/>
          <circle cx="306" cy="26" r="4.3" fill="#C97D8B"/>
          <circle cx="298" cy="21" r="4.3" fill="#C97D8B"/>
          <circle cx="298" cy="30" r="2.3" fill="#8B6146"/>
        </g>

        <!-- cuore rosso pendente al centro -->
        <g id="heartHang">
          <path d="M170 13 Q171 35 170 58" stroke="#A87F5F" stroke-width="2" fill="none" stroke-linecap="round"/>
          <g transform="translate(170,82)">
            <g id="heart">
              <path d="M0 -12 C-20 -30 -42 -8 0 26 C42 -8 20 -30 0 -12 Z" fill="#E63946"/>
              <ellipse cx="-11" cy="-11" rx="4.5" ry="3" fill="#FFFDF8" opacity="0.5" transform="rotate(-25 -11 -11)"/>
            </g>
          </g>
        </g>
      </svg>
    </div>

    <h1 class="title">Ci vediamo?</h1>
    <p class="subtitle">Aspetto la tua risposta&hellip; con il cuore in gola.</p>

    <div class="choice-row">
      <button class="btn btn-yes" id="btnYes">Sì</button>
      <button class="btn btn-no" id="btnNo">No</button>
    </div>

    <p class="hint" id="hint">&nbsp;</p>
  </div>
</div>

<script>
  const btnNo = document.getElementById('btnNo');
  const btnYes = document.getElementById('btnYes');
  const hint = document.getElementById('hint');
  const heart = document.getElementById('heart');

  const hints = [
    "il cuore lo sposta anche per te",
    "coraggio, riprova... o forse no ❤️",
    "quel No non si prende facilmente",
    "il Sì è la scelta più comoda",
    "forse è meglio arrendersi al Sì"
  ];
  let hintIndex = 0;
  let dodgeCount = 0;

  function placeButtonInitial() {
    const rect = btnYes.getBoundingClientRect();
    btnNo.style.left = (rect.right + 18) + 'px';
    btnNo.style.top = rect.top + 'px';
  }

  function randomSafePosition() {
    const margin = 24;
    const bw = btnNo.offsetWidth || 90;
    const bh = btnNo.offsetHeight || 50;
    const maxX = window.innerWidth - bw - margin;
    const maxY = window.innerHeight - bh - margin;
    const x = margin + Math.random() * Math.max(1, (maxX - margin));
    const y = margin + Math.random() * Math.max(1, (maxY - margin));
    return { x, y };
  }

  function dodge() {
    const { x, y } = randomSafePosition();
    btnNo.style.left = x + 'px';
    btnNo.style.top = y + 'px';
    dodgeCount++;
    hint.textContent = hints[hintIndex % hints.length];
    hintIndex++;
  }

  function distanceToButton(clientX, clientY) {
    const rect = btnNo.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    return Math.hypot(clientX - cx, clientY - cy);
  }

  const THRESHOLD = 110;

  window.addEventListener('mousemove', (e) => {
    if (distanceToButton(e.clientX, e.clientY) < THRESHOLD) {
      dodge();
    }
  });

  // Touch: se il dito si avvicina o tocca il bottone, scappa e blocca il click
  window.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    if (t && distanceToButton(t.clientX, t.clientY) < THRESHOLD) {
      dodge();
    }
  }, { passive: true });

  btnNo.addEventListener('touchstart', (e) => {
    e.preventDefault();
    e.stopPropagation();
    dodge();
  }, { passive: false });

  btnNo.addEventListener('click', (e) => {
    // fallback: non dovrebbe mai attivarsi, ma nel dubbio scappa comunque
    e.preventDefault();
    dodge();
  });

  btnYes.addEventListener('mouseenter', () => {
    heart.style.transform = 'scale(1.15)';
  });
  btnYes.addEventListener('mouseleave', () => {
    heart.style.transform = 'scale(1)';
  });

  btnYes.addEventListener('click', () => {
    window.location.href = 'appuntamento.html';
  });

  window.addEventListener('resize', () => {
    // riposiziona dentro i confini se la finestra cambia
    const rect = btnNo.getBoundingClientRect();
    const maxX = window.innerWidth - rect.width - 24;
    const maxY = window.innerHeight - rect.height - 24;
    if (rect.left > maxX || rect.top > maxY) dodge();
  });

  placeButtonInitial();
</script>

</body>
</html>
