<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quando ci vediamo? 💛</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-wrap">
  <div class="card">
    <p class="eyebrow">allora è un Sì, ottima scelta 🎉</p>

    <div class="illustration-wrap">
      <svg width="130" height="110" viewBox="0 0 130 110" xmlns="http://www.w3.org/2000/svg">
        <!-- corona di foglie -->
        <path d="M65 12 C30 12 12 40 20 65 C28 90 50 100 65 100 C80 100 102 90 110 65 C118 40 100 12 65 12 Z"
              fill="none" stroke="#4A5D45" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 8"/>
        <ellipse cx="65" cy="12" rx="8" ry="5" fill="#4A5D45" transform="rotate(90 65 12)"/>
        <ellipse cx="65" cy="100" rx="8" ry="5" fill="#4A5D45" transform="rotate(90 65 100)"/>
        <ellipse cx="20" cy="65" rx="8" ry="5" fill="#4A5D45" transform="rotate(20 20 65)"/>
        <ellipse cx="110" cy="65" rx="8" ry="5" fill="#4A5D45" transform="rotate(-20 110 65)"/>
        <!-- piccoli fiori -->
        <circle cx="34" cy="30" r="4" fill="#C97D8B"/>
        <circle cx="96" cy="30" r="4" fill="#C97D8B"/>
        <circle cx="34" cy="82" r="4" fill="#C97D8B"/>
        <circle cx="96" cy="82" r="4" fill="#C97D8B"/>
        <!-- cuore al centro -->
        <path d="M65 45 C50 30 30 47 65 78 C100 47 80 30 65 45 Z" fill="#E63946"/>
        <ellipse cx="55" cy="42" rx="4" ry="2.5" fill="#FFFDF8" opacity="0.55" transform="rotate(-25 55 42)"/>
      </svg>
    </div>

    <h1 class="title">Scegli un momento</h1>
    <p class="subtitle">Seleziona giorno e ora: hai tante possibilità.</p>

    <form id="formAppuntamento" novalidate>
      <div class="field">
        <label for="data">Che giorno</label>
        <input type="date" id="data" name="data" required>
      </div>
      <div class="field">
        <label for="ora">A che ora</label>
        <input type="time" id="ora" name="ora" required min="08:00" max="13:00" step="900">
      </div>
      <p class="hint" id="hintOra">&nbsp;</p>

      <button type="submit" class="btn btn-confirm" id="btnConferma" disabled>Conferma</button>
    </form>

    <a href="index.html" class="back-link">&larr; torna indietro</a>
  </div>
</div>

<script>
  const dataInput = document.getElementById('data');
  const oraInput = document.getElementById('ora');
  const btnConferma = document.getElementById('btnConferma');
  const form = document.getElementById('formAppuntamento');

  // consenti di scegliere solo il giorno di collegamento e quello successivo
  const oggi = new Date();
  const oggiISO = oggi.toISOString().split('T')[0];
  const domani = new Date(oggi);
  domani.setDate(oggi.getDate() + 1);
  const domaniISO = domani.toISOString().split('T')[0];

  dataInput.min = oggiISO;
  dataInput.max = domaniISO;

  // fascia oraria consentita: 8:00 - 13:00
  const ORA_MIN = '08:00';
  const ORA_MAX = '13:00';

  const hintOra = document.getElementById('hintOra');

  function correggiOrario() {
    if (!oraInput.value) { hintOra.textContent = '\u00A0'; return; }
    if (oraInput.value < ORA_MIN || oraInput.value > ORA_MAX) {
      oraInput.value = '';
      hintOra.textContent = 'troppo tardi 😴';
    } else {
      hintOra.textContent = '\u00A0';
    }
  }

  function correggiData() {
    if (!dataInput.value) return;
    if (dataInput.value !== oggiISO && dataInput.value !== domaniISO) {
      dataInput.value = '';
    }
  }

  function aggiornaStatoBottone() {
    btnConferma.disabled = !(dataInput.value && oraInput.value);
  }

  dataInput.addEventListener('input', () => { correggiData(); aggiornaStatoBottone(); });
  dataInput.addEventListener('change', () => { correggiData(); aggiornaStatoBottone(); });
  oraInput.addEventListener('input', () => { correggiOrario(); aggiornaStatoBottone(); });
  oraInput.addEventListener('change', () => { correggiOrario(); aggiornaStatoBottone(); });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    if (!dataInput.value || !oraInput.value) return;
    sessionStorage.setItem('cvd_data', dataInput.value);
    sessionStorage.setItem('cvd_ora', oraInput.value);
    window.location.href = 'conferma.html';
  });
</script>

</body>
</html>
