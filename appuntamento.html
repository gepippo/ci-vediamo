<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quando ci vediamo? 💛</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-wrap">
  <div class="card">
    <p class="eyebrow">allora è un Sì, ottima scelta 🎉</p>

    <div class="illustration-wrap">
      <svg width="130" height="110" viewBox="0 0 130 110" xmlns="http://www.w3.org/2000/svg">
        <!-- corona di foglie -->
        <path d="M65 12 C30 12 12 40 20 65 C28 90 50 100 65 100 C80 100 102 90 110 65 C118 40 100 12 65 12 Z"
              fill="none" stroke="#4A5D45" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 8"/>
        <ellipse cx="65" cy="12" rx="8" ry="5" fill="#4A5D45" transform="rotate(90 65 12)"/>
        <ellipse cx="65" cy="100" rx="8" ry="5" fill="#4A5D45" transform="rotate(90 65 100)"/>
        <ellipse cx="20" cy="65" rx="8" ry="5" fill="#4A5D45" transform="rotate(20 20 65)"/>
        <ellipse cx="110" cy="65" rx="8" ry="5" fill="#4A5D45" transform="rotate(-20 110 65)"/>
        <!-- piccoli fiori -->
        <circle cx="34" cy="30" r="4" fill="#C97D8B"/>
        <circle cx="96" cy="30" r="4" fill="#C97D8B"/>
        <circle cx="34" cy="82" r="4" fill="#C97D8B"/>
        <circle cx="96" cy="82" r="4" fill="#C97D8B"/>
        <!-- cuore al centro -->
        <path d="M65 45 C50 30 30 47 65 78 C100 47 80 30 65 45 Z" fill="#E63946"/>
        <ellipse cx="55" cy="42" rx="4" ry="2.5" fill="#FFFDF8" opacity="0.55" transform="rotate(-25 55 42)"/>
      </svg>
    </div>

    <h1 class="title">Scegli un momento</h1>
    <p class="subtitle">Seleziona giorno e ora: hai tante possibilità.</p>

    <form id="formAppuntamento" novalidate>
      <div class="field">
        <label for="data">Che giorno</label>
        <input type="text" id="data" name="data" inputmode="numeric" placeholder="gg/mm/aaaa" maxlength="10" autocomplete="off" required>
      </div>
      <p class="hint" id="hintData">&nbsp;</p>
      <div class="field">
        <label for="ora">A che ora</label>
        <input type="text" id="ora" name="ora" inputmode="numeric" placeholder="hh:mm" maxlength="5" autocomplete="off" required>
      </div>
      <p class="hint" id="hintOra">&nbsp;</p>

      <button type="submit" class="btn btn-confirm" id="btnConferma" disabled>Conferma</button>
    </form>

    <a href="index.html" class="back-link">&larr; torna indietro</a>
  </div>
</div>

<script>
  const dataInput = document.getElementById('data');
  const oraInput = document.getElementById('ora');
  const btnConferma = document.getElementById('btnConferma');
  const form = document.getElementById('formAppuntamento');
  const hintData = document.getElementById('hintData');
  const hintOra = document.getElementById('hintOra');

  // consenti di scegliere solo il giorno di collegamento (sysdate)
  const oggi = new Date();
  const oggiISO = oggi.toISOString().split('T')[0];

  // fascia oraria consentita: 8:00 - 13:00
  const ORA_MIN = '08:00';
  const ORA_MAX = '13:00';

  function soloNumeri(str) {
    return str.replace(/\D/g, '');
  }

  // mascheratura automatica del campo data in formato gg/mm/aaaa
  function formattaDataInput() {
    const cifre = soloNumeri(dataInput.value).slice(0, 8);
    let formattato = cifre;
    if (cifre.length > 4) {
      formattato = cifre.slice(0, 2) + '/' + cifre.slice(2, 4) + '/' + cifre.slice(4);
    } else if (cifre.length > 2) {
      formattato = cifre.slice(0, 2) + '/' + cifre.slice(2);
    }
    dataInput.value = formattato;
  }

  // mascheratura automatica del campo ora in formato HH:mm (24h)
  function formattaOraInput() {
    const cifre = soloNumeri(oraInput.value).slice(0, 4);
    let formattato = cifre;
    if (cifre.length > 2) {
      formattato = cifre.slice(0, 2) + ':' + cifre.slice(2);
    }
    oraInput.value = formattato;
  }

  // converte gg/mm/aaaa in aaaa-mm-gg (ISO), null se il formato non è valido
  function parseDataISO(str) {
    const m = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if (!m) return null;
    const [, gg, mm, aaaa] = m;
    const iso = `${aaaa}-${mm}-${gg}`;
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d.getTime()) || d.getDate() !== parseInt(gg, 10)) return null;
    return iso;
  }

  function correggiData() {
    if (!dataInput.value) { hintData.textContent = '\u00A0'; return; }
    const iso = parseDataISO(dataInput.value);
    if (!iso || iso !== oggiISO) {
      dataInput.value = '';
      hintData.textContent = 'troppo tardi 😴';
    } else {
      hintData.textContent = '\u00A0';
    }
  }

  function correggiOrario() {
    if (!oraInput.value) { hintOra.textContent = '\u00A0'; return; }
    const m = oraInput.value.match(/^([0-2]\d):([0-5]\d)$/);
    const valido = m && parseInt(m[1], 10) <= 23 && oraInput.value >= ORA_MIN && oraInput.value <= ORA_MAX;
    if (!valido) {
      oraInput.value = '';
      hintOra.textContent = 'troppo tardi 😴';
    } else {
      hintOra.textContent = '\u00A0';
    }
  }

  function aggiornaStatoBottone() {
    btnConferma.disabled = !(dataInput.value.length === 10 && oraInput.value.length === 5);
  }

  dataInput.addEventListener('input', () => { formattaDataInput(); aggiornaStatoBottone(); });
  dataInput.addEventListener('blur', () => { correggiData(); aggiornaStatoBottone(); });
  oraInput.addEventListener('input', () => { formattaOraInput(); aggiornaStatoBottone(); });
  oraInput.addEventListener('blur', () => { correggiOrario(); aggiornaStatoBottone(); });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    correggiData();
    correggiOrario();
    const isoData = parseDataISO(dataInput.value);
    if (!isoData || !oraInput.value) return;
    sessionStorage.setItem('cvd_data', isoData);
    sessionStorage.setItem('cvd_ora', oraInput.value);
    window.location.href = 'conferma.html';
  });
</script>

</body>
</html>
