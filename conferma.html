<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>È fatta! 💛</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-wrap">
  <div class="card">
    <p class="eyebrow" id="eyebrow">segnato sul calendario, con un cuoricino</p>

    <div class="illustration-wrap">
      <svg width="150" height="130" viewBox="0 0 150 130" xmlns="http://www.w3.org/2000/svg">
        <!-- nastro -->
        <path d="M75 70 L75 118" stroke="#B0596B" stroke-width="6" stroke-linecap="round"/>
        <path d="M60 108 L90 118 L60 128 Z" fill="#B0596B"/>
        <!-- gambi -->
        <path d="M75 70 Q60 50 45 30" stroke="#4A5D45" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M75 70 Q75 45 75 20" stroke="#4A5D45" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M75 70 Q90 50 105 30" stroke="#4A5D45" stroke-width="4" fill="none" stroke-linecap="round"/>
        <!-- foglie -->
        <ellipse cx="58" cy="52" rx="9" ry="5" fill="#4A5D45" transform="rotate(-40 58 52)"/>
        <ellipse cx="92" cy="52" rx="9" ry="5" fill="#4A5D45" transform="rotate(40 92 52)"/>

        <!-- fiore sinistro -->
        <g transform="translate(45,28)">
          <circle cx="-8" cy="-4" r="7" fill="#C97D8B"/>
          <circle cx="8" cy="-4" r="7" fill="#C97D8B"/>
          <circle cx="0" cy="-14" r="7" fill="#C97D8B"/>
          <circle cx="0" cy="4" r="7" fill="#C97D8B"/>
          <circle cx="0" cy="-4" r="5" fill="#E8D5B7"/>
        </g>
        <!-- fiore centrale, più grande -->
        <g transform="translate(75,16)">
          <circle cx="-10" cy="-5" r="8" fill="#B0596B"/>
          <circle cx="10" cy="-5" r="8" fill="#B0596B"/>
          <circle cx="0" cy="-17" r="8" fill="#B0596B"/>
          <circle cx="0" cy="6" r="8" fill="#B0596B"/>
          <circle cx="0" cy="-5" r="6" fill="#FAF3E7"/>
        </g>
        <!-- fiore destro -->
        <g transform="translate(105,28)">
          <circle cx="-8" cy="-4" r="7" fill="#C97D8B"/>
          <circle cx="8" cy="-4" r="7" fill="#C97D8B"/>
          <circle cx="0" cy="-14" r="7" fill="#C97D8B"/>
          <circle cx="0" cy="4" r="7" fill="#C97D8B"/>
          <circle cx="0" cy="-4" r="5" fill="#E8D5B7"/>
        </g>

        <!-- cuoricini che volano -->
        <path d="M20 70 C15 64 6 69 20 80 C34 69 25 64 20 70 Z" fill="#C97D8B" opacity="0.75"/>
        <path d="M128 78 C124 73 117 77 128 86 C139 77 132 73 128 78 Z" fill="#C97D8B" opacity="0.75"/>
        <text x="75" y="12" font-size="16" text-anchor="middle">💛</text>
      </svg>
    </div>

    <h1 class="title" id="fraseFinale">Non vedo l'ora di vederti.</h1>
    <p class="subtitle">Ho già iniziato il conto alla rovescia.</p>

    <div class="confirm-detail" id="dettaglio">
      Appuntamento da confermare
    </div>

    <a href="#" class="btn btn-whatsapp" id="btnWhatsapp">
      Condividi su WhatsApp
    </a>

    <a href="index.html" class="back-link">&larr; ricomincia</a>
  </div>
</div>

<script>
  const data = sessionStorage.getItem('cvd_data');
  const ora = sessionStorage.getItem('cvd_ora');
  const dettaglio = document.getElementById('dettaglio');
  const btnWhatsapp = document.getElementById('btnWhatsapp');

  function formattaData(iso) {
    if (!iso) return null;
    const [y, m, d] = iso.split('-');
    const mesi = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
    return `${parseInt(d,10)} ${mesi[parseInt(m,10)-1]} ${y}`;
  }

  let messaggio = "Sì, ci vediamo! 🦥💛";

  if (data && ora) {
    const dataLeggibile = formattaData(data);
    dettaglio.textContent = `📅 ${dataLeggibile} — 🕐 ${ora}`;
    messaggio = `Sì, ci vediamo! 🦥💛 Appuntamento: ${dataLeggibile} alle ${ora}.`;
  } else {
    dettaglio.textContent = "Nessun appuntamento selezionato";
  }

  // Nota: se vuoi inviare a un numero specifico, sostituisci PHONE_NUMBER
  // con il numero in formato internazionale senza + o spazi (es. 393331234567).
  // Lasciandolo vuoto, l'utente sceglierà lui stesso il contatto a cui inviare.
  const PHONE_NUMBER = "";

  const base = PHONE_NUMBER ? `https://wa.me/${PHONE_NUMBER}` : `https://wa.me/`;
  btnWhatsapp.href = `${base}?text=${encodeURIComponent(messaggio)}`;
</script>

</body>
</html>
